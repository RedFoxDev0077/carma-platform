name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# never run two deploys at once; cancel superseded ones
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff pytest

      - name: Ruff (lint)
        run: ruff check .

      - name: Pytest
        run: pytest -q

  deploy:
    name: Deploy to VPS
    needs: test
    # only deploy real pushes to main, never PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT="${{ secrets.VPS_PORT || '22' }}"
          ssh-keyscan -p "$PORT" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync code to VPS
        run: |
          PORT="${{ secrets.VPS_PORT || '22' }}"
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='reports/' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            --exclude='*.pyc' \
            -e "ssh -i ~/.ssh/deploy_key -p $PORT" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/carma/"

      - name: Build & restart containers
        run: |
          PORT="${{ secrets.VPS_PORT || '22' }}"
          ssh -i ~/.ssh/deploy_key -p "$PORT" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'set -e
             cd /opt/carma
             docker compose --env-file .env up -d --build
             docker compose run --rm api python scripts/init_db.py || true
             docker image prune -f'

      - name: Health check
        run: |
          PORT="${{ secrets.VPS_PORT || '22' }}"
          ssh -i ~/.ssh/deploy_key -p "$PORT" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'for i in $(seq 1 20); do
               if curl -fsS http://localhost:8000/health >/dev/null; then
                 echo "✅ healthy"; exit 0
               fi
               echo "waiting for app... ($i)"; sleep 3
             done
             echo "❌ health check failed"; docker compose -f /opt/carma/docker-compose.yml logs --tail=40 api; exit 1'
